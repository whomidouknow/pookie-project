<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Few Questions for You 😊</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #A9D18E;
            --card-white: #FFFFFF;
            --accent-red: #E06666;
            --accent-green: #A9D18E;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
        }

        .form-card {
            background: var(--card-white);
            padding: 35px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--accent-red);
            margin-bottom: 30px;
        }

        .question-group {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f1f1f1;
            text-align: left;
        }

        .question-text {
            font-weight: 700;
            display: block;
            margin-bottom: 15px;
            color: #444;
        }

        .options-container { display: flex; gap: 15px; }
        .options-container input[type="radio"] { display: none; }

        .opt-label {
            flex: 1; padding: 12px; border: 2px solid #eee;
            border-radius: 15px; cursor: pointer; font-weight: 700;
            text-align: center; transition: all 0.3s ease; color: #888;
        }

        .yes-input:checked + .opt-label {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
            color: white;
        }

        .no-input:checked + .opt-label {
            background-color: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
        }

        .submit-btn {
            background-color: var(--accent-red);
            color: white; border: none; width: 100%;
            padding: 16px; font-size: 1.1rem; font-weight: 700;
            border-radius: 50px; cursor: pointer; transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h1>You are mine 😊</h1>
        
        <form id="pookie-form" action="https://formspree.io/f/xgopjaab" method="POST">
            
            <div class="question-group">
                <span class="question-text">1. Do you trust me? ❤️</span>
                <div class="options-container">
                    <input type="radio" name="trust" value="Yes" id="q1y" class="yes-input" required>
                    <label for="q1y" class="opt-label">Yes</label>
                    <input type="radio" name="trust" value="No" id="q1n" class="no-input">
                    <label for="q1n" class="opt-label">No</label>
                </div>
            </div>

            <div class="question-group">
                <span class="question-text">2. Will you send me your pictures? 🫵🏼</span>
                <div class="options-container">
                    <input type="radio" name="pictures" value="Yes" id="q2y" class="yes-input" required>
                    <label for="q2y" class="opt-label">Yes</label>
                    <input type="radio" name="pictures" value="No" id="q2n" class="no-input">
                    <label for="q2n" class="opt-label">No</label>
                </div>
            </div>

            <div class="question-group">
                <span class="question-text">3. Will you dance for me? ✨</span>
                <div class="options-container">
                    <input type="radio" name="dance" value="Yes" id="q3y" class="yes-input" required>
                    <label for="q3y" class="opt-label">Yes</label>
                    <input type="radio" name="dance" value="No" id="q3n" class="no-input">
                    <label for="q3n" class="opt-label">No</label>
                </div>
            </div>

            <div class="question-group">
                <span class="question-text">4. Would you allow me to touch your waist? 🥰</span>
                <div class="options-container">
                    <input type="radio" name="waist" value="Yes" id="q4y" class="yes-input" required>
                    <label for="q4y" class="opt-label">Yes</label>
                    <input type="radio" name="waist" value="No" id="q4n" class="no-input">
                    <label for="q4n" class="opt-label">No</label>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">Lesss go 💖</button>
        </form>
    </div>

    <script>
        const form = document.getElementById("pookie-form");
        const submitBtn = document.getElementById("submit-btn");

        // IMPORTANT: Ensure your gallery file is named "main.html"
        const redirectUrl = "main.html"; 

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            submitBtn.innerHTML = "Sending...";
            submitBtn.disabled = true;

            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    submitBtn.innerHTML = "Redirecting... ❤️";
                    // Brief delay so she can see the success state
                    setTimeout(() => {
                        window.location.href = redirectUrl; 
                    }, 800);
                } else {
                    submitBtn.innerHTML = "Try Again 😅";
                    submitBtn.disabled = false;
                }
            }).catch(error => {
                submitBtn.innerHTML = "Error ❌";
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
