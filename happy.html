<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg-color: #A9D18E; /* Signature Green */
            --text-color: #FFFFFF;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; /* Use Swiper only */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative;
        }

        /* --- BACKGROUND LAYER (Floating & Rising) --- */
        .decoration-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Swipe through them */
            z-index: 1; /* Below cards */
        }

        /* --- Sizing for Decorations --- */
        .balloon {
            position: absolute; bottom: -20%; /* Spawn lower for bigger size */
            font-size: 100px; /* --- MEGA BIG BALLOONS --- */
            opacity: 0.8;
            animation: rise linear forwards;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .butterfly {
            position: absolute;
            font-size: 60px; /* --- BIG BUTTERFLIES --- */
            opacity: 0.9;
            animation: flutter linear infinite;
        }

        .heart {
            position: absolute;
            font-size: 80px; /* --- BIG HEARTS --- */
            opacity: 0.7;
            animation: rise linear forwards;
        }

        @keyframes rise {
            to { transform: translateY(-130vh) rotate(var(--rot)); opacity: 0; }
        }

        @keyframes flutter {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(var(--xoff), var(--yoff)) rotate(var(--r)); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* --- HEADER SECTION --- */
        .header {
            position: fixed;
            top: 20px;
            text-align: center;
            z-index: 10; /* Above cards */
            text-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3.2rem;
            color: var(--text-color);
            margin: 0;
        }

        p { color: white; font-size: 1.1rem; margin-top: 5px; }

        /* --- THE SWIPER CARDS (Swipe effect) --- */
        .swiper {
            width: 85%;
            max-width: 380px;
            height: 520px;
            z-index: 5; /* Middle layer */
            margin-top: 80px; /* Header space */
        }

        .swiper-slide {
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
            overflow: hidden;
            border: 8px solid white;
        }

        .swiper-slide img, .swiper-slide video {
            width: 100%;
            height: 82%;
            object-fit: cover;
            border-radius: 15px 15px 0 0;
        }

        .caption-area {
            height: 18%; display: flex;
            justify-content: center; align-items: center;
            padding: 10px; background: white;
        }

        .caption-text { color: #444; font-weight: 600; font-size: 1.1rem; text-align: center; }

        /* Pagination dots */
        .swiper-pagination-bullet-active { background: white !important; }
    </style>
</head>
<body>

    <div class="decoration-layer" id="decor"></div>

    <div class="header">
        <h1>THANK YOU! ❤️</h1>
        <p>You've made me the happiest person alive.</p>
    </div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">

            <div class="swiper-slide">
                <img src="1.jpeg" alt="Memory 1">
                <div class="caption-area">
                    <span class="caption-text">You are my sunshine ☀️</span>
                </div>
            </div>

            <div class="swiper-slide">
                <img src="2.jpeg" alt="Memory 2">
                <div class="caption-area">
                    <span class="caption-text">Your Smile 💓</span>
                </div>
            </div>

            <div class="swiper-slide">
                <img src="3.jpeg" alt="Memory 2">
                <div class="caption-area">
                    <span class="caption-text">This fine shyt is mine ✨</span>
                </div>
            </div>

            <div class="swiper-slide">
                <video autoplay loop muted playsinline>
                    <source src="video1.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="caption-area">
                    <span class="caption-text">what should i say about it 🎥</span>
                </div>
            </div>

        </div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // 1. Initialize the Swipe Cards
        var swiper = new Swiper(".mySwiper", {
            effect: "cards", 
            grabCursor: true,
            pagination: { el: ".swiper-pagination", clickable: true },
        });

        // 2. Generate BIG Decorations
        const decor = document.getElementById('decor');
        const balloonEmojis = ['🎈', '🎈', '🤍', '💖', '✨', '🎈']; 
        const butterflyEmojis = ['🦋', '🦋', '🤍', '✨'];
        const heartEmojis = ['❤️', '💖', '💗', '💓', '🤍'];

        // Helper function for random values
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);

        // Helper to set random style for depth
        function setDepthStyles(item) {
            const depth = Math.random(); 
            if (depth < 0.3) {
                // Background (smaller, blurry, soft)
                item.style.fontSize = randomInt(40, 60) + 'px'; 
                item.style.filter = 'blur(2px)';
                item.style.opacity = 0.4;
                item.style.zIndex = 1;
            } else if (depth < 0.7) {
                // Midground (standard)
                item.style.fontSize = randomInt(70, 90) + 'px';
                item.style.zIndex = 2;
                item.style.opacity = 0.7;
            } else {
                // Foreground (large, sharp)
                item.style.fontSize = randomInt(100, 130) + 'px';
                item.style.zIndex = 3;
                item.style.opacity = 0.9;
                item.style.filter = 'drop-shadow(0 8px 15px rgba(0,0,0,0.1))';
            }
        }

        // Generate Butterflies (Float around - larger area)
        setInterval(() => {
            const b = document.createElement('div');
            b.className = 'butterfly';
            b.innerHTML = butterflyEmojis[Math.floor(Math.random() * butterflyEmojis.length)];
            b.style.left = Math.random() * 100 + 'vw';
            b.style.top = Math.random() * 90 + 'vh'; 
            
            // Varied sizes for butterflies too
            const size = randomInt(50, 80);
            b.style.fontSize = size + 'px';

            b.style.animationDuration = (Math.random() * 4 + 4) + 's';
            b.style.setProperty('--xoff', (Math.random() * 150 - 75) + 'px');
            b.style.setProperty('--yoff', (Math.random() * 150 - 75) + 'px');
            b.style.setProperty('--r', (Math.random() * 360 - 180) + 'deg');
            decor.appendChild(b);
            setTimeout(() => b.remove(), 8000);
        }, 800); // New butterfly every 0.8s (FASTER)

        // Generate Balloons (Rise from the bottom)
        setInterval(() => {
            const ball = document.createElement('div');
            ball.className = 'balloon';
            ball.innerHTML = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
            ball.style.left = Math.random() * 100 + 'vw';
            
            setDepthStyles(ball); // Apply size/depth

            ball.style.animationDuration = (Math.random() * 4 + 4) + 's';
            ball.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
            decor.appendChild(ball);
            setTimeout(() => ball.remove(), 8000);
        }, 500); // New balloon every 0.5s (FAST)

        // Generate Hearts (Rise from the bottom)
        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            h.style.left = Math.random() * 100 + 'vw';
            
            setDepthStyles(h); // Apply size/depth

            h.style.animationDuration = (Math.random() * 5 + 4) + 's';
            h.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
            decor.appendChild(h);
            setTimeout(() => h.remove(), 9000);
        }, 600); // New heart every 0.6s (FAST)
    </script>
</body>
</html>
